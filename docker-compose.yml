version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: oop-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: oop_db
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - oop-network

networks:
  oop-network:
    driver: bridge

volumes:
  postgres_data:
