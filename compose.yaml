name: sion_oop

services:
  postgres:
    container_name: oop-postgres
    image: 'postgres:17-alpine'
    environment:
      - 'POSTGRES_DB=oop'
      - 'POSTGRES_PASSWORD=oop1234'
      - 'POSTGRES_USER=oop'
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
